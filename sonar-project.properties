sonar.projectKey=party-planner-frontend
sonar.projectName=Party Planner Frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

sonar.exclusions=node_modules/**,dist/**,coverage/**,src/main.tsx,src/vite-env.d.ts,**/*.d.ts,**/*.config.*,src/test/setup.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
